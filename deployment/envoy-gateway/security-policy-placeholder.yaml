apiVersion: v1
kind: ConfigMap
metadata:
  name: security-policy-placeholder
  namespace: relay-system
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/part-of: relay
data:
  README.md: |
    Placeholder only.

    This ConfigMap marks where Envoy Gateway JWT validation policy wiring will attach for protected gRPC routes.

    Relay's approved auth direction is:
    - Envoy Gateway validates short-lived access JWTs on protected backend routes.
    - Identity owns refresh-token validation and rotation.
    - Public auth-entry RPCs such as RegisterUser, AuthenticatePassword, RefreshSession,
      and RedeemEmailVerificationToken remain reachable without prior access-JWT validation.

    Replace this placeholder with reviewed SecurityPolicy resource(s) once the protected-vs-public
    GRPCRoute split and JWKS source are finalized.
  example-securitypolicy.yaml: |
    # Example only; do not apply as final policy without final route split and JWKS review.
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: SecurityPolicy
    metadata:
      name: protected-route-jwt-example
      namespace: relay-system
    spec:
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
          name: bootstrap
      jwt:
        providers:
          - name: relay-access-jwt
            issuer: https://identity.relay.example
            remoteJWKS:
              uri: https://identity.relay.example/.well-known/jwks.json
      # Attach JWT validation only to protected GRPCRoutes.
      # Do not attach it to public auth-entry routes that must remain callable without an access JWT.
