services:
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: relay-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: relay
      RABBITMQ_DEFAULT_PASS: relay
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - relay_rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:18-alpine
    container_name: relay-postgres
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: guest
      POSTGRES_PASSWORD: guest
    ports:
      - "5432:5432"

volumes:
  relay_rabbitmq_data:
