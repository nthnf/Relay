services:
  postgres:
    image: postgres:18-alpine
    container_name: relay-postgres
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: guest
      POSTGRES_PASSWORD: guest
    ports:
      - "5432:5432"
    volumes:
      - relay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  relay_postgres_data:
