apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: relay
resources:
  - ../base
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: rabbitmq-definitions
    files:
      - rabbitmq.conf=rabbitmq/rabbitmq.conf
      - definitions.json=rabbitmq/definitions.json
