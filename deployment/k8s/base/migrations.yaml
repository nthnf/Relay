apiVersion: batch/v1
kind: Job
metadata:
  name: identity-migration
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command: ["sh", "-c", "until pg_isready -h identity-postgres -U relay; do sleep 2; done"]
      containers:
        - name: migration
          image: relay/identity:local
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/identity-migration", "up"]
          envFrom:
            - secretRef:
                name: identity-db-secret
---
