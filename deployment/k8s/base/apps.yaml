apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
        - name: identity
          image: relay/identity:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:50051
          envFrom:
            - configMapRef:
                name: relay-runtime-config
            - secretRef:
                name: relay-runtime-secret
            - secretRef:
                name: identity-db-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity
spec:
  selector:
    app: identity
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
