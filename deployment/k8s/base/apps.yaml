apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime
  template:
    metadata:
      labels:
        app: realtime
    spec:
      containers:
        - name: realtime
          image: relay/realtime:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
            - name: websocket
              containerPort: 8080
          env:
            - name: GRPC_BIND_ADDR
              value: 0.0.0.0:50051
            - name: WS_BIND_ADDR
              value: 0.0.0.0:8080
          envFrom:
            - configMapRef:
                name: relay-runtime-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: realtime
spec:
  type: NodePort
  selector:
    app: realtime
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: websocket
      port: 8080
      targetPort: websocket
      nodePort: 30080
