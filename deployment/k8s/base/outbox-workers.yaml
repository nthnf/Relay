apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-outbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-outbox
  template:
    metadata:
      labels:
        app: identity-outbox
    spec:
      containers:
        - name: outbox
          image: relay/outbox:local
          imagePullPolicy: IfNotPresent
          env:
            - name: OUTBOX_PUBLISHER_SERVICE
              value: identity
          envFrom:
            - configMapRef:
                name: relay-runtime-config
            - secretRef:
                name: identity-db-secret
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
