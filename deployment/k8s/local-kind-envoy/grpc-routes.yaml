apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: identity-grpc
  namespace: relay
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: relay
spec:
  parentRefs:
    - name: relay-gateway
      sectionName: grpc
  hostnames:
    - identity.local
  rules:
    - backendRefs:
        - name: identity
          port: 50051
---
