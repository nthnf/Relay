apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: realtime-websocket
  namespace: relay
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: relay
spec:
  parentRefs:
    - name: relay-gateway
      sectionName: http
  hostnames:
    - realtime.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: realtime
          port: 8080
