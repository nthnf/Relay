syntax = "proto3";

package relay.chat;

import "google/protobuf/timestamp.proto";

service ChatService {
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc ListConversationMessages(ListConversationMessagesRequest) returns (ListMessagesResponse);
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
}

enum ConversationTargetType {
  CONVERSATION_TARGET_TYPE_UNSPECIFIED = 0;
  CONVERSATION_TARGET_TYPE_DM = 1;
  CONVERSATION_TARGET_TYPE_WORKSPACE_CHANNEL = 2;
}

message CreateMessageRequest {
  string conversation_id = 1;
  string body = 2;
  optional string client_message_id = 3;
}

message CreateMessageResponse {
  string message_id = 1;
  string conversation_id = 2;
  string author_user_id = 3;
  int64 conversation_message_seq = 4;
  string body = 5;
  google.protobuf.Timestamp created_at = 6;
}

message EditMessageRequest {
  string message_id = 1;
  string new_body = 2;
}

message EditMessageResponse {
  string message_id = 1;
  string conversation_id = 2;
  string body = 3;
  google.protobuf.Timestamp edited_at = 4;
}

message DeleteMessageRequest {
  string message_id = 1;
}

message DeleteMessageResponse {
  string message_id = 1;
  string conversation_id = 2;
  google.protobuf.Timestamp deleted_at = 3;
  bool deleted = 4;
  bool already_deleted = 5;
}

message ListConversationMessagesRequest {
  string conversation_id = 1;
  optional int32 page_size = 2;
  optional int64 before_conversation_message_seq = 3;
}

message MessageSummary {
  string message_id = 1;
  string author_user_id = 2;
  int64 conversation_message_seq = 3;
  string body = 4;
  string message_status = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp last_edited_at = 7;
  optional google.protobuf.Timestamp deleted_at = 8;
}

message ListMessagesResponse {
  repeated MessageSummary messages = 1;
  optional int64 next_before_conversation_message_seq = 2;
}

message CreateConversationRequest {
  ConversationTargetType target_type = 1;
  optional string peer_user_id = 2;
  optional string workspace_channel_id = 3;
}

message CreateConversationResponse {
  string conversation_id = 1;
  repeated string member_user_ids = 2;
  google.protobuf.Timestamp created_at = 3;
  bool created = 4;
}
