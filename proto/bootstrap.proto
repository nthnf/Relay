syntax = "proto3";

package relay.bootstrap;

import "google/protobuf/timestamp.proto";

service BootstrapService {
  rpc GetAppBootstrap(GetAppBootstrapRequest) returns (GetAppBootstrapResponse);
  rpc GetWorkspaceBootstrap(GetWorkspaceBootstrapRequest) returns (GetWorkspaceBootstrapResponse);
  rpc GetDmBootstrap(GetDmBootstrapRequest) returns (GetDmBootstrapResponse);
}

message UserCard {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  optional string avatar_url = 4;
}

message AppWorkspaceItem {
  string workspace_id = 1;
  string name = 2;
  optional string icon_url = 3;
  int32 unread_count = 4;
}

message GetAppBootstrapRequest {}

message GetAppBootstrapResponse {
  UserCard viewer = 1;
  repeated AppWorkspaceItem workspaces = 2;
  int32 pending_friend_request_count = 3;
}

message WorkspaceBootstrapHeader {
  string workspace_id = 1;
  string name = 2;
  optional string icon_url = 3;
  int32 member_count = 4;
  int32 unread_count = 5;
}

message WorkspaceBootstrapChannel {
  string channel_id = 1;
  string conversation_id = 2;
  string name = 3;
  string channel_kind = 4;
  int32 position = 5;
  int32 unread_count = 6;
}

message GetWorkspaceBootstrapRequest {
  string workspace_id = 1;
}

message GetWorkspaceBootstrapResponse {
  WorkspaceBootstrapHeader workspace = 1;
  repeated WorkspaceBootstrapChannel channels = 2;
}

message DmThreadItem {
  string conversation_id = 1;
  string dm_pair_id = 2;
  string peer_user_id = 3;
  string peer_username = 4;
  string peer_display_name = 5;
  optional string peer_avatar_url = 6;
  int32 unread_count = 7;
  string last_message_preview = 8;
  optional google.protobuf.Timestamp last_activity_at = 9;
}

message GetDmBootstrapRequest {}

message GetDmBootstrapResponse {
  repeated DmThreadItem items = 1;
}
