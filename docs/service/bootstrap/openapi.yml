openapi: 3.1.0
info:
  title: Bootstrap API
  version: 0.1.0
  summary: Projection-backed read API for denormalized UI bootstrap queries.
servers:
  - url: https://api.example.com
    description: Public endpoint through Traefik and gateway
tags:
  - name: Bootstrap
paths:
  /v1/bootstrap/home:
    get:
      tags: [Bootstrap]
      summary: Return the signed-in user's home screen aggregate
      description: Returns `200` with the latest available projected snapshot for the actor. If some projection rows lag, array fields may be empty and count fields may be zero rather than returning `404`.
      operationId: getBootstrapHome
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Home payload optimized to render the initial app shell without N+1 fetches. Friends preview is accepted friends only and is ordered by username.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /v1/bootstrap/friends:
    get:
      tags: [Bootstrap]
      summary: Return the signed-in user's denormalized friend list
      description: Returns `200` with an empty collection when no accepted-friend projection rows have materialized yet. V1 includes accepted friends only.
      operationId: getBootstrapFriends
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Friend list payload intended to avoid per-friend profile fetches, ordered by username ascending then user ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /v1/bootstrap/workspaces:
    get:
      tags: [Bootstrap]
      summary: Return workspace cards for the signed-in user
      description: Returns `200` with an empty collection when no workspace projection rows have materialized yet.
      operationId: getBootstrapWorkspaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Workspace summaries with unread and recent activity fields, ordered by latest activity descending then workspace ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /v1/bootstrap/workspaces/{workspaceId}/sidebar:
    get:
      tags: [Bootstrap]
      summary: Return workspace sidebar data in one read
      description: Returns `404` only when bootstrap has no projected evidence that the actor can access the workspace. If workspace access is known but channel projections lag, returns `200` with the latest available workspace snapshot and an empty or partial channel list ordered by position.
      operationId: getBootstrapWorkspaceSidebar
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sidebar payload with workspace header, channels, and unread state ordered by channel position ascending then channel ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSidebarResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthenticatedResponse:
      description: Missing, expired, or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFoundResponse:
      description: Workspace not visible to caller according to bootstrap's latest access projection
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalErrorResponse:
      description: Unexpected bootstrap failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
    HomeResponse:
      type: object
      additionalProperties: false
      required: [user, summary, friends_preview, workspaces]
      description: Denormalized home payload. `friends_preview` is accepted friends only and ordered by username ascending then user ID. `workspaces` is ordered by latest activity descending then workspace ID.
      properties:
        user:
          $ref: '#/components/schemas/UserCard'
        summary:
          type: object
          additionalProperties: false
          required: [friend_count, workspace_count, unread_workspace_count, total_unread_count]
          properties:
            friend_count:
              type: integer
              minimum: 0
            workspace_count:
              type: integer
              minimum: 0
            unread_workspace_count:
              type: integer
              minimum: 0
            total_unread_count:
              type: integer
              minimum: 0
        friends_preview:
          type: array
          items:
            $ref: '#/components/schemas/FriendListItem'
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceCard'
    FriendsResponse:
      type: object
      additionalProperties: false
      required: [items]
      description: Accepted-friends collection ordered by username ascending then user ID.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FriendListItem'
    WorkspacesResponse:
      type: object
      additionalProperties: false
      required: [items]
      description: Workspace collection ordered by latest activity descending then workspace ID.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceCard'
    WorkspaceSidebarResponse:
      type: object
      additionalProperties: false
      required: [workspace, channels]
      description: Latest available projected workspace snapshot for a known accessible workspace. `channels` is ordered by position ascending then channel ID and may be empty during projection lag.
      properties:
        workspace:
          type: object
          additionalProperties: false
          required: [workspace_id, name, icon_url, member_count, unread_count]
          properties:
            workspace_id:
              type: string
              format: uuid
            name:
              type: string
            icon_url:
              type: string
              format: uri
              nullable: true
            member_count:
              type: integer
              minimum: 0
            unread_count:
              type: integer
              minimum: 0
            last_activity_at:
              type: string
              format: date-time
              nullable: true
        channels:
          type: array
          items:
            $ref: '#/components/schemas/SidebarChannel'
    UserCard:
      type: object
      additionalProperties: false
      required: [user_id, username]
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
    FriendListItem:
      type: object
      additionalProperties: false
      required: [user_id, username, status]
      description: Accepted friend row in v1.
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [accepted]
        accepted_at:
          type: string
          format: date-time
          nullable: true
    WorkspaceCard:
      type: object
      additionalProperties: false
      required: [workspace_id, name, member_count, channel_count, unread_count]
      description: Workspace card row used in ordered workspace collections.
      properties:
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        icon_url:
          type: string
          format: uri
          nullable: true
        member_count:
          type: integer
          minimum: 0
        channel_count:
          type: integer
          minimum: 0
        unread_count:
          type: integer
          minimum: 0
        last_message_preview:
          type: string
          nullable: true
        last_activity_at:
          type: string
          format: date-time
          nullable: true
    SidebarChannel:
      type: object
      additionalProperties: false
      required: [channel_id, name, kind, position, unread_count, mention_count]
      description: Sidebar channel row ordered by `position` ascending then `channel_id`.
      properties:
        channel_id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [text]
        position:
          type: integer
          minimum: 0
        unread_count:
          type: integer
          minimum: 0
        mention_count:
          type: integer
          minimum: 0
        last_message_preview:
          type: string
          nullable: true
        last_activity_at:
          type: string
          format: date-time
          nullable: true
